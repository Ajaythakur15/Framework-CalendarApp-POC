# Triggers pipeline execution when code is pushed to main or master
trigger:
  branches:
    include:
      - main
      - master

# Triggers pipeline execution for pull requests targeting main or master
pr:
  branches:
    include:
      - main
      - master

# Uses Microsoft-hosted Windows build agent
pool:
  vmImage: 'windows-latest'

# Reusable pipeline variables
variables:
  buildConfiguration: 'Release'
  testProject: 'Uhm.Framework.CalendarApp.Poc.Tests/Uhm.Framework.CalendarApp.Poc.Tests.csproj'
  testResultsFolder: 'Uhm.Framework.CalendarApp.Poc.Tests/bin/Debug/net8.0/TestResults'
  testFilter: ''

steps:
# Installs required .NET SDK version on the build agent
- task: UseDotNet@2
  displayName: Install .NET SDK
  inputs:
    packageType: sdk
    version: 8.x

# Restores NuGet packages using the custom NuGet configuration file
- task: DotNetCoreCLI@2
  displayName: Restore project
  inputs:
    command: restore
    projects: '$(testProject)'
    feedsToUse: config
    nugetConfigPath: 'NuGet.Poc.Config'

# Builds the project after restore
- task: DotNetCoreCLI@2
  displayName: Build project
  inputs:
    command: build
    projects: '$(testProject)'
    arguments: '--configuration $(buildConfiguration) --no-restore'

# Executes automated tests for the configured project
- task: DotNetCoreCLI@2
  displayName: Run tests
  inputs:
    command: test
    projects: '$(testProject)'
    arguments: '--configuration $(buildConfiguration) --no-build $(testFilter)'
    publishTestResults: true

# Publishes generated test results, reports, and screenshots as pipeline artifacts
- task: PublishPipelineArtifact@1
  displayName: Publish Extent report and screenshots
  condition: always()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(testResultsFolder)'
    artifact: 'calendarapp-testresults'
    publishLocation: 'pipeline'