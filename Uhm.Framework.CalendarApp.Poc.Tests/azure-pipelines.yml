trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  testProject: 'Uhm.Framework.CalendarApp.Poc.Tests/Uhm.Framework.CalendarApp.Poc.Tests.csproj'
  testResultsFolder: 'Uhm.Framework.CalendarApp.Poc.Tests/bin/Debug/net8.0/TestResults'

steps:
- task: UseDotNet@2
  displayName: Install .NET SDK
  inputs:
    packageType: sdk
    version: 8.x

- task: DotNetCoreCLI@2
  displayName: Restore project
  inputs:
    command: restore
    projects: '$(testProject)'
    feedsToUse: config
    nugetConfigPath: 'NuGet.Poc.Config'

- task: DotNetCoreCLI@2
  displayName: Build project
  inputs:
    command: build
    projects: '$(testProject)'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: Run tests
  inputs:
    command: test
    projects: '$(testProject)'
    arguments: '--configuration $(buildConfiguration) --no-build'
    publishTestResults: true

- task: PublishPipelineArtifact@1
  displayName: Publish Extent report and screenshots
  condition: always()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(testResultsFolder)'
    artifact: 'calendarapp-testresults'
    publishLocation: 'pipeline'
